<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel関数クイズ</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802"

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(135deg,#064e3b,#0f172a);
  color:#fff;
}
header{
  padding:28px 16px;
  text-align:center;
  background:linear-gradient(135deg,#10b981,#059669);
}
header h1{margin:0;font-size:30px}
header p{margin:8px 0 0;color:#ecfdf5}
.ad{
  max-width:900px;
  margin:16px auto;
  padding:10px;
  background:#ffffff10;
  border-radius:14px;
}
.container{
  max-width:900px;
  margin:0 auto;
  padding:16px;
}
.card{
  background:#ffffff;
  color:#111827;
  border-radius:22px;
  padding:24px;
  box-shadow:0 20px 40px #0005;
}
.info{
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
  font-weight:bold;
}
.badge{
  background:#d1fae5;
  color:#065f46;
  padding:8px 12px;
  border-radius:999px;
}
.question{
  font-size:22px;
  font-weight:800;
  margin:18px 0;
  line-height:1.6;
}
.choices{
  display:grid;
  gap:12px;
}
button.choice{
  border:2px solid #d1d5db;
  background:#f9fafb;
  padding:16px;
  border-radius:16px;
  font-size:16px;
  cursor:pointer;
  text-align:left;
}
button.choice:hover{
  background:#ecfdf5;
  border-color:#10b981;
}
button.correct{
  background:#dcfce7;
  border-color:#22c55e;
}
button.wrong{
  background:#fee2e2;
  border-color:#ef4444;
}
.explain{
  margin-top:18px;
  padding:16px;
  background:#f3f4f6;
  border-radius:14px;
  display:none;
  line-height:1.7;
}
.result{
  text-align:center;
  display:none;
}
.result h2{font-size:30px}
.restart{
  margin-top:20px;
  padding:14px 24px;
  border:none;
  border-radius:999px;
  background:#10b981;
  color:white;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
}
.progress{
  height:12px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
  margin:18px 0;
}
.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#10b981,#22c55e);
}
.footer{
  text-align:center;
  color:#d1fae5;
  padding:30px 10px;
}
</style>
</head>

<body>

<header>
  <h1>Excel関数クイズ</h1>
  <p>SUM・IF・VLOOKUP・XLOOKUP・COUNTIFなどを楽しく学ぼう</p>
</header>

<div class="ad">
  <!-- UIゲーム -->
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-8398161859137802"
       data-ad-slot="6325875393"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</div>

<div class="container">
  <div class="card" id="quizCard">
    <div class="info">
      <div class="badge" id="count">1 / 30</div>
      <div class="badge" id="score">正解 0</div>
    </div>

    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>

    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
  </div>

  <div class="card result" id="result">
    <h2>結果発表</h2>
    <p id="resultText"></p>
    <button class="restart" onclick="restartQuiz()">もう一度挑戦する</button>
  </div>
</div>

<div class="footer">
  Excel関数の基礎力チェックに使える学習クイズ
</div>

<script>
const allQuestions = [
  {q:"合計を求める関数はどれ？", c:["SUM","AVERAGE","COUNT","MAX"], a:0, e:"SUM関数は指定した範囲の数値を合計します。例：=SUM(A1:A10)"},

  {q:"数値が入っているセルの個数を数える関数は？", c:["COUNTA","COUNT","COUNTIF","SUMIF"], a:1, e:"COUNTは数値セルの個数を数えます。文字も含めるならCOUNTAです。"},
  {q:"空白ではないセルを数える関数は？", c:["COUNT","COUNTA","COUNTBLANK","LEN"], a:1, e:"COUNTAは文字・数値を問わず、空白でないセルを数えます。"},

  {q:"複数条件すべてが正しいか判定する関数は？", c:["OR","AND","IFERROR","NOT"], a:1, e:"AND関数はすべての条件がTRUEのときTRUEを返します。"},
  {q:"複数条件のどれか1つが正しいか判定する関数は？", c:["AND","OR","IFS","MATCH"], a:1, e:"OR関数は1つでも条件がTRUEならTRUEを返します。"},

  {q:"条件に合うセルの個数を数える関数は？", c:["SUMIF","COUNTIF","AVERAGEIF","MATCH"], a:1, e:"COUNTIFは条件に合うセル数を数えます。例：=COUNTIF(A:A,\"東京\")"},

  {q:"条件に合う数値の平均を求める関数は？", c:["AVERAGE","AVERAGEIF","COUNTIF","SUMIF"], a:1, e:"AVERAGEIFは条件に合うデータの平均を求めます。"},
  {q:"複数条件で個数を数える関数は？", c:["COUNTIFS","COUNTIF","SUMIFS","IFS"], a:0, e:"COUNTIFSは複数条件に一致するセルを数えます。"},
  {q:"複数条件で合計する関数は？", c:["SUMIF","SUMIFS","COUNTIFS","AVERAGEIFS"], a:1, e:"SUMIFSは複数条件に一致した数値を合計します。"},
  {q:"複数条件で平均を求める関数は？", c:["AVERAGEIFS","AVERAGEIF","SUMIFS","COUNTIFS"], a:0, e:"AVERAGEIFSは複数条件に一致した値の平均を求めます。"},
  {q:"エラー時に別の値を表示する関数は？", c:["IFNA","IFERROR","ERROR","ISERROR"], a:1, e:"IFERRORは計算結果がエラーなら指定した値を返します。"},
  {q:"#N/Aエラーだけを処理したいときに使う関数は？", c:["IFERROR","IFNA","ISNA","NA"], a:1, e:"IFNAは#N/Aエラーの場合だけ代替値を返します。"},
  {q:"文字数を数える関数は？", c:["TEXT","LEN","COUNT","VALUE"], a:1, e:"LEN関数は文字列の文字数を返します。"},
  {q:"左から指定文字数を取り出す関数は？", c:["LEFT","RIGHT","MID","FIND"], a:0, e:"LEFTは左端から指定した文字数を取り出します。"},

  {q:"右から指定文字数を取り出す関数は？", c:["LEFT","RIGHT","MID","SEARCH"], a:1, e:"RIGHTは右端から指定した文字数を取り出します。"},

  {q:"今日の日付を表示する関数は？", c:["NOW","TODAY","DATE","DAY"], a:1, e:"TODAY関数は現在の日付を返します。"},

  {q:"2つの日付の差を日数で求める関数は？", c:["DAYS","DATE","DAY","DATEDIF"], a:0, e:"DAYS関数は2つの日付の間の日数を返します。"},
  {q:"営業日数を数える関数は？", c:["WORKDAY","NETWORKDAYS","DAYS","WEEKDAY"], a:1, e:"NETWORKDAYSは開始日から終了日までの営業日数を返します。"},

  {q:"複数の条件を順番に判定する関数は？", c:["IF","IFS","AND","OR"], a:1, e:"IFS関数は複数条件を順番に判定できます。"},

let questions = [];
let current = 0;
let score = 0;
const total = 30;
let locked = false;

function shuffle(array){
  return array.sort(() => Math.random() - 0.5);
}

function startQuiz(){
  questions = shuffle([...allQuestions]).slice(0,total);
  current = 0;
  score = 0;
  locked = false;
  document.getElementById("quizCard").style.display = "block";
  document.getElementById("result").style.display = "none";
  showQuestion();
}

function showQuestion(){
  locked = false;
  const q = questions[current];
  document.getElementById("count").textContent = `${current + 1} / ${total}`;
  document.getElementById("score").textContent = `正解 ${score}`;
  document.getElementById("bar").style.width = `${(current / total) * 100}%`;
  document.getElementById("question").textContent = q.q;
  document.getElementById("explain").style.display = "none";
  document.getElementById("explain").textContent = "";

  const choices = document.getElementById("choices");
  choices.innerHTML = "";

  q.c.forEach((choice, index) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = choice;
    btn.onclick = () => answer(index, btn);
    choices.appendChild(btn);
  });
}

function answer(index){
  if(locked) return;
  locked = true;

  const q = questions[current];
  const buttons = document.querySelectorAll(".choice");

  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if(i === q.a) btn.classList.add("correct");
    if(i === index && i !== q.a) btn.classList.add("wrong");
  });

  if(index === q.a) score++;

  const explain = document.getElementById("explain");
  explain.style.display = "block";
  explain.textContent = q.e;

  setTimeout(() => {
    current++;
    if(current < total){
      showQuestion();
    }else{
      showResult();
    }
  }, 1300);
}

function showResult(){
  document.getElementById("quizCard").style.display = "none";
  document.getElementById("result").style.display = "block";
  document.getElementById("bar").style.width = "100%";

  let rank = "";
  if(score >= 27) rank = "Excel関数マスター級！かなり実務で使えるレベルです。";
  else if(score >= 22) rank = "かなり優秀！基本関数はしっかり理解できています。";
  else if(score >= 15) rank = "中級レベル。IF・COUNTIF・VLOOKUP系を復習すると伸びます。";
  else rank = "基礎から復習がおすすめ。SUM、IF、COUNTIFから覚えると一気に伸びます。";

  document.getElementById("resultText").innerHTML =
    `あなたのスコアは <strong>${score} / ${total}</strong> です。<br><br>${rank}`;
}

function restartQuiz(){
  startQuiz();
}

startQuiz();
</script>
